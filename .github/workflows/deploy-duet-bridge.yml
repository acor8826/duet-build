name: Deploy duet-bridge

# Deploys the FastMCP duet-bridge to Cloud Run on every push to master that
# touches server/**. Mirrors server/deploy.ps1 (same flags, env vars, and
# secret bindings) but runs keylessly via Workload Identity Federation.
#
# One-time GCP setup: run server/setup-github-deploy.ps1 (creates the WIF
# pool/provider + github-deployer service account and sets the two GitHub
# repo variables referenced below).

on:
  push:
    branches: [master]
    paths:
      - "server/**"
      - ".github/workflows/deploy-duet-bridge.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for WIF token exchange

concurrency:
  group: deploy-duet-bridge
  cancel-in-progress: false

env:
  # The live duet-bridge service lives in asc-router — NOT the ambient gcloud
  # default project on the dev machine. Deploying elsewhere creates a second
  # service with a different URL and the claude.ai connector keeps talking to
  # the old one.
  PROJECT: asc-router
  REGION: australia-southeast1
  SERVICE: duet-bridge
  PARTNER_MODEL: gpt-5.6

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          # ANTHROPIC_API_KEY is optional (enables the server-side duet_run
          # Opus role); bind it only if the secret exists, same as deploy.ps1.
          SECRET_MAP="OPENAI_API_KEY=duet-openai-key:latest,DUET_MCP_BEARER=duet-mcp-bearer:latest"
          if gcloud secrets describe duet-anthropic-key --project "$PROJECT" >/dev/null 2>&1; then
            echo "duet-anthropic-key found; enabling server-side duet_run (Opus role)."
            SECRET_MAP="$SECRET_MAP,ANTHROPIC_API_KEY=duet-anthropic-key:latest"
          else
            echo "duet-anthropic-key NOT found; deploying without it (duet_run will report unavailable)."
          fi
          # Durable session state: suspended GPT turns must survive instance
          # recycling during long orchestrator-side research pauses.
          STATE_BUCKET="$PROJECT-duet-state"
          if ! gcloud storage buckets describe "gs://$STATE_BUCKET" --project "$PROJECT" >/dev/null 2>&1; then
            echo "Creating state bucket gs://$STATE_BUCKET..."
            gcloud storage buckets create "gs://$STATE_BUCKET" --location "$REGION" --project "$PROJECT" \
              --uniform-bucket-level-access
          fi
          PROJ_NUM=$(gcloud projects describe "$PROJECT" --format 'value(projectNumber)')
          gcloud storage buckets add-iam-policy-binding "gs://$STATE_BUCKET" \
            --member "serviceAccount:${PROJ_NUM}-compute@developer.gserviceaccount.com" \
            --role roles/storage.objectAdmin --project "$PROJECT" >/dev/null
          gcloud run deploy "$SERVICE" \
            --source server \
            --region "$REGION" \
            --project "$PROJECT" \
            --allow-unauthenticated \
            --set-env-vars "OPENAI_PARTNER_MODEL=$PARTNER_MODEL,DUET_TRANSPORT=http,DUET_STATE_DIR=/tmp/duet-state,DUET_STATE_GCS_BUCKET=$STATE_BUCKET,DUET_ITERATION_CAP=8,DUET_CONFIDENCE_THRESHOLD=95,DUET_OPUS_MODEL=claude-fable-5,DUET_OPENAI_TIMEOUT=150,DUET_MAX_OUTPUT_TOKENS=8000,DUET_GPT_REASONING_EFFORT=medium,DUET_MAX_TOTAL_DOC_CHARS=120000,DUET_MAX_TOOL_RESULT_CHARS=60000" \
            --set-secrets "$SECRET_MAP" \
            --memory 512Mi \
            --cpu 1 \
            --concurrency 4 \
            --max-instances 3 \
            --timeout 3600

      - name: Report service URL
        run: |
          url=$(gcloud run services describe "$SERVICE" --region "$REGION" --project "$PROJECT" --format 'value(status.url)')
          echo "DUET_BRIDGE_URL=$url" >> "$GITHUB_STEP_SUMMARY"
